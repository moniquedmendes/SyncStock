name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore backend dependencies
        run: dotnet restore tests/SyncStock.Backend.Tests/SyncStock.Backend.Tests.csproj

      - name: Build backend
        run: dotnet build tests/SyncStock.Backend.Tests/SyncStock.Backend.Tests.csproj --configuration Release --no-restore

      - name: Run backend tests
        run: dotnet test tests/SyncStock.Backend.Tests/SyncStock.Backend.Tests.csproj --configuration Release --no-build

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sync-stock-front

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: sync-stock-front/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend tests
        run: npm run test

      - name: Build frontend
        run: npm run build
